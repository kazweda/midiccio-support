name: Deploy Privacy Policy (GitHub Pages)

on:
  push:
    branches:
      - main
    paths:
      - PRIVACY_POLICY.md
      - PRIVACY_POLICY_EN.md
      - ci_scripts/build_privacy_policy_site.py
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install markdown dependency
        run: pip install markdown==3.10.2

      - name: Build privacy policy page
        run: |
          python ci_scripts/build_privacy_policy_site.py \
            --input PRIVACY_POLICY.md \
            --output _site/privacy-policy/index.html
          python ci_scripts/build_privacy_policy_site.py \
            --input PRIVACY_POLICY_EN.md \
            --output _site/privacy-policy/en/index.html

      - name: Create root redirect page
        run: |
          cat > _site/index.html << 'EOF'
          <!doctype html>
          <html lang="ja">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0;url=privacy-policy/" />
              <title>midiccio Privacy Policy</title>
            </head>
            <body>
              <p><a href="privacy-policy/">Privacy Policy へ移動</a></p>
            </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
